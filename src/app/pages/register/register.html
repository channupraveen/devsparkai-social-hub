<main class="auth-page">
  <div class="auth-box">
    <header class="auth-head">
      <div class="brand">
        <svg class="brand-logo" viewBox="0 0 64 64" fill="none" aria-hidden="true">
          <path
            d="M32 6C33.9 19.2 44.8 30.1 58 32C44.8 33.9 33.9 44.8 32 58C30.1 44.8 19.2 33.9 6 32C19.2 30.1 30.1 19.2 32 6Z"
            stroke="#E2532D"
            stroke-width="3.5"
            stroke-linejoin="round"
          />
        </svg>
        <div class="brand-text">
          <span class="brand-name">DevSpark <em>AI</em></span>
          <span class="brand-product">SocialHub</span>
        </div>
      </div>
      <span class="status">
        <span class="status-dot"></span>
        Console ready
      </span>
    </header>

    <div class="auth-body">
      <p class="eyebrow">Register</p>
      <h1>Create your account</h1>
      <p class="lede">Set up your workspace in under a minute.</p>

      <form class="auth-form" (ngSubmit)="register()">
        <div class="field">
          <label for="name">Full name</label>
          <input
            id="name"
            name="name"
            type="text"
            placeholder="Your name"
            [(ngModel)]="name"
            autocomplete="name"
            required
          />
        </div>

        <div class="field">
          <label for="email">Email address</label>
          <input
            id="email"
            name="email"
            type="email"
            placeholder="you@devsparkai.com"
            [(ngModel)]="email"
            autocomplete="email"
            required
          />
        </div>

        <div class="field">
          <div class="label-row">
            <label for="password">Password</label>
            <button
              type="button"
              class="peek"
              (click)="showPassword = !showPassword"
            >
              {{ showPassword ? 'Hide' : 'Show' }}
            </button>
          </div>
          <input
            id="password"
            name="password"
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Minimum 8 characters"
            [(ngModel)]="password"
            autocomplete="new-password"
            minlength="8"
            required
          />
          <span class="hint">Use at least 8 characters.</span>
        </div>

        @if (errorMessage) {
          <p class="error-message">{{ errorMessage }}</p>
        }

        <button type="submit" class="submit-btn" [disabled]="isLoading">
          {{ isLoading ? 'Creating account…' : 'Create account' }}
        </button>
      </form>
    </div>

    <footer class="auth-foot">
      Already have an account?
      <a routerLink="/login">Sign in</a>
    </footer>
  </div>
</main>
